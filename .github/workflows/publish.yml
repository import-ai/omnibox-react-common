name: Build and publish to dist branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to dist branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/dist-artifacts
          cp -r dist /tmp/dist-artifacts/
          cp package.json /tmp/dist-artifacts/
          git fetch origin dist || true
          git checkout -b dist origin/dist || git checkout -b dist
          git rm -rf .
          cp -r /tmp/dist-artifacts/dist/* .
          cp /tmp/dist-artifacts/package.json .
          rm -rf node_modules dist
          git add -A
          git commit -m "Build ${{ github.sha }}"
          git push origin dist --force
